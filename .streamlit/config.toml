[theme]
primaryColor = "#2E86AB"
backgroundColor = "#0F1419"
secondaryBackgroundColor = "#1a2332"
textColor = "#F8F9FA"
font = "sans serif"

[client]
showErrorDetails = true
toolbarMode = "developer"

[logger]
level = "info"

[server]
port = 8501
headless = true
runOnSave = true
maxUploadSize = 200
enableCORS = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false
